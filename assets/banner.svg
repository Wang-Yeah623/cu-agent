<svg viewBox="0 0 1200 340" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', 'PingFang SC', 'Helvetica Neue', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#07c160"/>
      <stop offset="1" stop-color="#19d6a6"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="0.12" r="0.7">
      <stop offset="0" stop-color="#07c160" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#07c160" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="340" rx="14" fill="url(#bg)"/>
  <rect width="1200" height="340" rx="14" fill="url(#glow)"/>
  <rect x="0" y="0" width="6" height="340" fill="url(#accent)"/>

  <!-- left: text -->
  <text x="64" y="78" fill="#8b949e" font-size="15" letter-spacing="4" font-weight="600">SEMI-AUTONOMOUS CODING AGENT · 半自主编程 AGENT</text>
  <text x="60" y="166" fill="#f0f6fc" font-size="92" font-weight="800" letter-spacing="-1">Cu Agent</text>
  <text x="64" y="214" fill="#c9d1d9" font-size="26" font-weight="500">Text your AI on WeChat. Wake up to working code.</text>
  <text x="64" y="250" fill="#19d6a6" font-size="22" font-weight="500">给微信发条需求，它就在你电脑上把代码写好。</text>

  <!-- pills -->
  <g font-size="15" font-weight="600">
    <rect x="64"  y="276" width="146" height="32" rx="16" fill="#0e2a1c" stroke="#1f5c3d"/>
    <text x="82"  y="297" fill="#3fd98a">WeChat-driven</text>
    <rect x="222" y="276" width="178" height="32" rx="16" fill="#161b22" stroke="#30363d"/>
    <text x="240" y="297" fill="#c9d1d9">Any LLM · DeepSeek</text>
    <rect x="412" y="276" width="96" height="32" rx="16" fill="#161b22" stroke="#30363d"/>
    <text x="430" y="297" fill="#c9d1d9">VS Code</text>
    <rect x="520" y="276" width="190" height="32" rx="16" fill="#161b22" stroke="#30363d"/>
    <text x="538" y="297" fill="#c9d1d9">Human-in-the-loop</text>
  </g>

  <!-- right: chat bubble -> code window motif -->
  <g>
    <!-- chat bubble -->
    <rect x="812" y="96" width="150" height="64" rx="16" fill="#07c160"/>
    <path d="M 836 158 L 832 178 L 856 160 Z" fill="#07c160"/>
    <text x="828" y="124" fill="#06301c" font-size="15" font-weight="700">帮我做个</text>
    <text x="828" y="146" fill="#06301c" font-size="15" font-weight="700">博客网站</text>

    <!-- arrow -->
    <path d="M 974 150 H 1006" stroke="#3fd98a" stroke-width="3" fill="none"/>
    <path d="M 1004 144 L 1016 150 L 1004 156 Z" fill="#3fd98a"/>

    <!-- code window -->
    <rect x="1028" y="92" width="120" height="156" rx="12" fill="#0b0f15" stroke="#30363d"/>
    <rect x="1028" y="92" width="120" height="26" rx="12" fill="#161b22"/>
    <circle cx="1044" cy="105" r="4" fill="#ff5f56"/>
    <circle cx="1058" cy="105" r="4" fill="#ffbd2e"/>
    <circle cx="1072" cy="105" r="4" fill="#27c93f"/>
    <rect x="1042" y="134" width="44" height="7" rx="3.5" fill="#19d6a6"/>
    <rect x="1042" y="150" width="78" height="7" rx="3.5" fill="#3b475a"/>
    <rect x="1054" y="166" width="60" height="7" rx="3.5" fill="#3b475a"/>
    <rect x="1054" y="182" width="40" height="7" rx="3.5" fill="#c9a227"/>
    <rect x="1042" y="198" width="70" height="7" rx="3.5" fill="#3b475a"/>
    <rect x="1042" y="214" width="30" height="7" rx="3.5" fill="#19d6a6"/>
  </g>
</svg>
